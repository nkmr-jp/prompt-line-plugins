name: "{json@hash}"
description: "{json@message}"
icon: git-commit
color: orange
sourceCommand: "bash git-log.sh {projectdir}"
inputFormat: "{json@hash} {json@message}"
maxSuggestions: 50
searchPrefix: gl
tooltip: |-
  hash: {json@fullhash}
  author: {json@author}
  date: {json@date}
  refs: {json@refs}
  url: {json@url}
