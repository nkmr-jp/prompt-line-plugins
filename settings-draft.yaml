# Prompt Line Settings Configuration
# This file is automatically generated but can be manually edited
# See: https://github.com/nkmr-jp/prompt-line/docs/settings.md

# ============================================================================
# WINDOW SETTINGS
# ============================================================================
# Position options:
#   - active-text-field: Near focused text field (default, falls back to active-window-center)
#   - active-window-center: Center within active window
#   - cursor: At mouse cursor location
#   - center: Center on primary display
window:
  position: active-text-field
  size: 640                      # Recommended: 400-800 pixels
  height: 320                    # Recommended: 200-400 pixels

# ============================================================================
# KEYBOARD SHORTCUTS
# ============================================================================
# Format: Modifier+Key (e.g., Cmd+Shift+Space, Ctrl+Alt+Space)
# Available modifiers: Cmd, Ctrl, Alt, Shift
shortcuts:
  Cmd+Shift+Space: main  # Show/hide the input window (global)
  Cmd+Enter: paste       # Paste text and close window
  Escape: close          # Close window without pasting
  Ctrl+j: historyNext    # Navigate to next history item
  Ctrl+k: historyPrev    # Navigate to previous history item
  Cmd+f: search          # Enable search mode in history
  # Ctrl+m: "input=@md:" # Custom action (e.g. input text field "input=xxx")
  # Ctrl+g: "input=@ghq:"
  # Ctrl+]: "input=@z:"
  # Ctrl+r: "input=@r:"

# ============================================================================
# PLUGIN SETTINGS (refs: `prompt-line-plugin help`)
# ============================================================================
# You can add your own plugins. refs: `prompt-line-plugin help`
# - claude/custom-search/agents@agent のように場合は @agent: で検索できます。
plugins:
  github.com/nkmr-jp/prompt-line-plugins:
    # - agents/agent-skills/skills              # sourcePath: ~/.agents/skills/**/SKILL.md
    - claude/agent-built-in/en                  # Claude Code built-in commands,skills,agents | lang: en,ja
    - claude/agent-skills/commands              # sourcePath: ~/.claude/commands/*.md
    - claude/agent-skills/plugin-commands       # sourcePath: ~/.claude/plugins/cache/*/*/{latest}/**/commands/*.md
    - claude/agent-skills/plugin-skills         # sourcePath: ~ /.claude/plugins/cache/*/*/{latest}/**/SKILL.md
    - claude/agent-skills/skills                # sourcePath: ~/.claude/skills/**/SKILL.md
    - claude/custom-search/agents@agent         # sourcePath: ~/.claude/agents/*.md
    - claude/custom-search/plans@plan           # sourcePath: ~/.claude/plans/*.md
    - claude/custom-search/plugin-agents@agent  # sourcePath: ~/.claude/plugins/cache/*/*/{latest}/**/agents/*.md
    - claude/custom-search/teams@team           # sourcePath: "~/.claude/teams/**/config.json@. | select(.createdAt / 1000 > (now - 86400)) | select((.members | length) >= 2) | .members"
    - claude/custom-search/history@r            # sourcePath: ~/.claude/history.jsonl
    # - codex/agent-built-in/en                 # Codex CLI built-in commands | lang: en,ja
    # - gemini/agent-built-in/en                # Gemini CLI built-in commands | lang: en,ja
    # - path/custom-search/ghq@ghq?open=iTerm   # sourceCommand: ghq list

# ============================================================================
# FILE OPENER SETTINGS
# ============================================================================
# Configure which applications to use when opening file links
fileOpener:
  # Default editor for all files (null = use system default application)
  defaultEditor: null # (e.g. "Visual Studio Code")
  # Extension-specific applications (overrides `defaultEditor` and `directories`)
  extensions:
    png: "Preview"
    pdf: "Preview"
    # go: "Goland"
    # md: "typora"
  # Directory-specific default editor (overrides `defaultEditor`, longest prefix match)
  # directories:
  #   - path: "~/ghq/github.com/nkmr-jp/prompt-line*"
  #     editor: "Goland"

# ============================================================================
# FILE SEARCH SETTINGS
# ============================================================================
# @path/to/file completion
fileSearch:
  respectGitignore: true # Respect .gitignore files
  includeHidden: true    # Include hidden files
  maxFiles: 100000       # Maximum files to return
  maxDepth: null         # Directory depth (null = unlimited)
  maxSuggestions: 50     # Suggestions to show
  followSymlinks: false  # Follow symbolic links
  #fdPath: null          # Custom path to fd
  includePatterns: []    # Force include files even if .gitignore (e.g. ["*.log", "dist/**"])
  excludePatterns: []    # Additional patterns to exclude (e.g. ["*.min.js", "coverage/**"])

# ============================================================================
# SYMBOL SEARCH SETTINGS
# ============================================================================
# @ts:Config, @go:Handler language symbol completion
symbolSearch:
  respectGitignore: true # Respect .gitignore files
  maxSymbols: 200000     # Maximum symbols to return
  timeout: 60000         # Search timeout in ms
  #rgPath: null          # Custom path to rg
  includePatterns: []    # Force include files even if .gitignore (e.g. ["*.test.ts", "vendor/**"])
  excludePatterns: []    # Additional patterns to exclude (e.g. ["*.min.js", "coverage/**"])

# ============================================================================
# CUSTOM SEARCH SETTINGS (@ mentions)
# ============================================================================
# Custom search entries for @ mention sources
# Template variables: {basename}, {frontmatter@fieldName}

# Custom search entries — triggered by typing "@prefix:" (e.g., @agent:, @plan:)
# Supports: Markdown (.md), JSON (.json), JSONL (.jsonl), jq expressions, and plain text files.
# searchPrefix: Search with @<prefix>: (e.g., searchPrefix: "@agent" → @agent:)
customSearch:
  # Finder Dir History
  - name: "{line}"
    icon: folder
    color: lime
    description: ""
    path: "~/.prompt-line"
    searchPrefix: @z
    pattern: "z.txt"
    inputFormat: "{line}"
    maxSuggestions: 100
