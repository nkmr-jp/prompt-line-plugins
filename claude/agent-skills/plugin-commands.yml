# Claude Code plugin commands (from ~/.claude/plugins/cache/**/commands/*.md)
pluginDescription: "~/.claude/plugins/cache/**/commands/*.md"
name: "{prefix}:{basename}"
description: "{frontmatter@description}"
path: ~/.claude/plugins/cache
pattern: "**/commands/*.md"
values:
  prefix: "**/.claude-plugin/*.json@name"
label: plugin command
color: gray
icon: "{frontmatter@icon}"
argumentHint: "{frontmatter@argument-hint}"
maxSuggestions: 20
excludeMarker: ".orphaned_at"
