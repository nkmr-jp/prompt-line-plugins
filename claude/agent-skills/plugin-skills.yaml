# Claude Code plugin skills
# See: https://code.claude.com/docs/en/plugins-reference#plugin-caching-and-file-resolution
sourcePath: ~/.claude/plugins/cache/*/*/{latest}/**/SKILL.md
name: "{frontmatter@name}"
label: "{pathdir:1} / {pathdir:2}"
description: "{frontmatter@description}"
argumentHint: "{frontmatter@argument-hint}"
excludeIf: "{frontmatter@user-invocable}==false"
