# Claude Code prompt history
sourcePath: "~/.claude/history.jsonl"
name: "{json@display}"
icon: history
color: orange
searchPrefix: r
orderBy: "{json@timestamp} desc"
inputFormat: "{json@display}|{json@display}"
displayTime: "{json@timestamp}"
tooltip: "text: {json@pastedContents.1.content}|{json@pastedContents.2.content}|{json@pastedContents.3.content}|{json@display}\nproject: {json@project}"
maxSuggestions: 100
