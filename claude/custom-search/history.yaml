# Claude Code prompt history
sourcePath: "~/.claude/history.jsonl"
name: "{json@display}"
icon: history
color: orange
searchPrefix: r
orderBy: "{json@timestamp} desc"
inputFormat: "{json@display}|{json@display}"
displayTime: "{json@timestamp}"
tooltip: "{json@pastedContents.1.content}|{json@display}"
maxSuggestions: 100
