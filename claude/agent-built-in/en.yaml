name: claude
description: Claude Code built-in commands,skills,agents
color: amber  # You can also use hex codes like "#FF6B35"
references:
  - https://code.claude.com/docs/en/commands
  - https://code.claude.com/docs/en/skills#bundled-skills
  - https://code.claude.com/docs/en/sub-agents#built-in-subagents

commands:
  - name: add-dir
    description: Add a working directory for file access during the current session
    argument-hint: "<path>"
  - name: agents
    description: Manage agent configurations
  - name: autofix-pr
    description: Spawn a Claude Code on the web session that watches the current branch's PR and pushes fixes when CI fails or reviewers leave comments
    argument-hint: "[prompt]"
  - name: btw
    description: Ask a quick side question without adding to the conversation
    argument-hint: "<question>"
  - name: branch
    description: "Create a branch of the current conversation at this point. Alias: /fork"
    argument-hint: "[name]"
  - name: chrome
    description: Configure Claude in Chrome settings
  - name: clear
    description: "Clear conversation history and free up context. Aliases: /reset, /new"
  - name: color
    description: "Set the prompt bar color for the current session. Available colors: red, blue, green, yellow, purple, orange, pink, cyan. Use `default` to reset"
    argument-hint: "[color|default]"
  - name: compact
    description: Compact conversation with optional focus instructions
    argument-hint: "[instructions]"
  - name: config
    description: "Open the Settings interface to adjust theme, model, output style, and other preferences. Alias: /settings"
  - name: context
    description: Visualize current context usage as a colored grid. Shows optimization suggestions for context-heavy tools, memory bloat, and capacity warnings
  - name: copy
    description: "Copy the last assistant response to clipboard. Pass a number N to copy the Nth-latest response (e.g. /copy 2). When code blocks are present, shows an interactive picker to select individual blocks or the full response. Press `w` in the picker to write the selection to a file instead of the clipboard, which is useful over SSH"
    argument-hint: "[N]"
  - name: cost
    description: Show token usage statistics
  - name: desktop
    description: "Continue the current session in the Claude Code Desktop app (macOS and Windows only). Alias: /app"
  - name: diff
    description: Open an interactive diff viewer showing uncommitted changes and per-turn diffs. Use left/right arrows to switch between the current git diff and individual Claude turns, and up/down to browse files
  - name: doctor
    description: Diagnose and verify your Claude Code installation and settings
  - name: effort
    description: "Set the model effort level. low/medium/high persist across sessions; max applies to the current session only (requires Opus 4.6); auto resets to model default. Without an argument, shows the current level. Takes effect immediately"
    argument-hint: "[low|medium|high|max|auto]"
  - name: exit
    description: "Exit the CLI. Alias: /quit"
  - name: export
    description: "Export the current conversation as plain text. With a filename, writes directly to that file; without, opens a dialog to copy to clipboard or save to a file"
    argument-hint: "[filename]"
  - name: extra-usage
    description: Configure extra usage to keep working when rate limits are hit
  - name: fast
    description: Toggle Fast mode on or off
    argument-hint: "[on|off]"
  - name: feedback
    description: "Submit feedback about Claude Code. Alias: /bug"
    argument-hint: "[report]"
  - name: fork
    description: "Create a fork of the current conversation at this point. Alias for: /branch"
    argument-hint: "[name]"
  - name: help
    description: Get usage help
  - name: hooks
    description: View hook configurations for tool events
  - name: ide
    description: Manage IDE integrations and show status
  - name: insights
    description: Generate an analysis report of Claude Code sessions (project areas, operation patterns, friction points)
  - name: init
    description: "Initialize project with CLAUDE.md guide. Set CLAUDE_CODE_NEW_INIT=true for an interactive flow that also walks through skills, hooks, and personal memory files"
  - name: install-github-app
    description: Set up Claude GitHub Actions for a repository
  - name: install-slack-app
    description: Install the Claude Slack app
  - name: keybindings
    description: Open or create your keybindings configuration file
  - name: login
    description: Sign in to your Anthropic account
  - name: logout
    description: Sign out from your Anthropic account
  - name: loop
    description: Run a prompt or slash command on a recurring interval (e.g. /loop 5m /foo, defaults to 10m)
    argument-hint: "[interval] [command]"
  - name: mcp
    description: Manage MCP server connections and OAuth authentication
  - name: memory
    description: Edit CLAUDE.md memory files, enable or disable auto-memory, and view auto-memory entries
  - name: mobile
    description: "Show QR code to download the Claude mobile app. Aliases: /ios, /android"
  - name: model
    description: Select or change the AI model. For models that support it, use left/right arrows to adjust effort level. Takes effect immediately without waiting for the current response to finish
    argument-hint: "[model]"
  - name: passes
    description: Share a free week of Claude Code with friends. Only visible if your account is eligible
  - name: permissions
    description: "Manage allow, ask, and deny rules for tool permissions. Alias: /allowed-tools"
  - name: plan
    description: "Enter plan mode directly from the prompt. Pass an optional description to enter plan mode and immediately start with that task, for example /plan fix the auth bug"
    argument-hint: "[description]"
  - name: plugin
    description: Manage Claude Code plugins
  - name: powerup
    description: Discover Claude Code features through quick interactive lessons with animated demos
  - name: privacy-settings
    description: View and update your privacy settings. Only available for Pro and Max plan subscribers
  - name: release-notes
    description: View the changelog in an interactive version picker, with the most recent version closest to your prompt
  - name: reload-plugins
    description: Reload all active plugins to apply pending changes without restarting. Reports counts for each reloaded component and flags any load errors
  - name: remote-control
    description: "Make this session available for remote control from claude.ai. Aliases: /rc"
  - name: remote-env
    description: Configure the default remote environment for web sessions started with --remote
  - name: rename
    description: Rename the current session and show the name on the prompt bar. Without a name, auto-generates one from conversation history
    argument-hint: "[name]"
  - name: resume
    description: "Resume a conversation by ID or name, or open the session picker. Alias: /continue"
    argument-hint: "[session]"
  - name: review
    description: "Deprecated. Install the code-review plugin instead: claude plugin install code-review@claude-plugins-official"
  - name: rewind
    description: "Rewind the conversation and/or code to a previous point, or summarize from a selected message. See checkpointing. Alias: /checkpoint"
  - name: sandbox
    description: Toggle sandbox mode. Available on supported platforms only
  - name: schedule
    description: "Create, update, list, or run Cloud scheduled tasks. Claude walks you through the setup conversationally"
    argument-hint: "[description]"
  - name: security-review
    description: Analyze pending changes on the current branch for security vulnerabilities. Reviews the git diff and identifies risks like injection, auth issues, and data exposure
  - name: setup-bedrock
    description: Configure Amazon Bedrock authentication (visible when CLAUDE_CODE_USE_BEDROCK=1)
  - name: setup-vertex
    description: Configure Google Vertex AI authentication (visible when CLAUDE_CODE_USE_VERTEX=1)
  - name: skills
    description: List available skills
  - name: stats
    description: "Visualize daily usage, session history, streaks, and model preferences"
  - name: status
    description: "Open the Settings interface (Status tab) showing version, model, account, and connectivity. Works while Claude is responding"
  - name: statusline
    description: "Configure Claude Code's status line. Describe what you want, or run without arguments to auto-configure from your shell prompt"
  - name: stickers
    description: Order Claude Code stickers
  - name: tasks
    description: "List and manage background tasks. Alias: /bashes"
  - name: team-onboarding
    description: Generate a teammate ramp-up guide from local Claude Code usage
  - name: teleport
    description: "Pull a Claude Code on the web session into this terminal. Aliases: /tp"
    argument-hint: "[session]"
  - name: terminal-setup
    description: Configure terminal keybindings for Shift+Enter and other shortcuts. Only visible in terminals that need it, like VS Code, Alacritty, or Warp
  - name: theme
    description: "Change the color theme. Includes light/dark variants, colorblind-accessible (daltonized), and ANSI themes"
  - name: ultraplan
    description: Draft a plan in an ultraplan session, review in browser, then execute
    argument-hint: "<prompt>"
  - name: upgrade
    description: Open the upgrade page to switch to a higher plan tier
  - name: usage
    description: Show plan usage limits and rate limit status
  - name: voice
    description: Toggle push-to-talk voice dictation. Requires a Claude.ai account
  - name: web-setup
    description: Connect GitHub account to Claude Code on the web using local gh CLI credentials
skills:
  - name: batch
    description: "Research and plan a large-scale change, then execute it in parallel across 5–30 isolated worktree agents that each open a PR."
    argument-hint: "<instruction>"
  - name: claude-api
    description: "Build apps with the Claude API or Anthropic SDK. TRIGGER when: code imports `anthropic`/`@anthropic-ai/sdk`/`claude_agent_sdk`, or user asks to use Claude API, Anthropic SDKs, or Agent SDK."
  - name: debug
    description: Enable debug logging for the current session and troubleshoot issues by reading the session debug log. Optionally describe the issue to focus the analysis.
    argument-hint: "[description]"
  - name: loop
    description: "Run a prompt repeatedly while the session stays open. Omit interval for self-pacing. Omit prompt to run autonomous maintenance check (or prompt from `.claude/loop.md`)."
    argument-hint: "[interval] <prompt>"
  - name: simplify
    description: Review changed code for reuse, quality, and efficiency, then fix any issues found.
    argument-hint: "[focus]"
agents:
  - name: Explore
    description: A fast, read-only agent optimized for searching and analyzing codebases.
  - name: Plan
    description: A research agent used during plan mode to gather context before presenting a plan.
  - name: general-purpose
    description: A capable agent for complex, multi-step tasks that require both exploration and action.
  - name: statusline-setup
    description: When you run /statusline to configure your status line
  - name: claude-code-guide
    description: When you ask questions about Claude Code features
