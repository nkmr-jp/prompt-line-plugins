name: claude-ja
description: Claude Code built-in commands,skills,agents
color: amber  # 16進コードも使用可能 例: "#FF6B35"
references:
  - https://code.claude.com/docs/en/commands
  - https://code.claude.com/docs/en/skills#bundled-skills
  - https://code.claude.com/docs/en/sub-agents#built-in-subagents

commands:
  - name: add-dir
    description: 現在のセッションにファイルアクセス用の作業ディレクトリを追加する
    argument-hint: "<path>"
  - name: agents
    description: エージェント設定を管理する
  - name: autofix-pr
    description: 現在のブランチのPRを監視し、CIが失敗したりレビューコメントが付いたら自動で修正をプッシュするClaude Code Webセッションを起動する
    argument-hint: "[prompt]"
  - name: background
    description: "現在のセッションをバックグラウンドエージェントとしてデタッチし、ターミナルを解放する。プロンプトを渡すとデタッチ前に追加の指示を送信できる。エイリアス: /bg"
    argument-hint: "[prompt]"
  - name: branch
    description: "現在の会話のこの時点でブランチを作成する。エイリアス: /fork"
    argument-hint: "[name]"
  - name: btw
    description: 会話に追加せずに素早くサイドクエスチョンをする
    argument-hint: "<question>"
  - name: chrome
    description: Claude in Chromeの設定を行う
  - name: clear
    description: "空のコンテキストで新しい会話を開始する。直前の会話は /resume から引き続き利用できる。名前を渡すと直前の会話にラベルを付ける。エイリアス: /reset, /new"
    argument-hint: "[name]"
  - name: color
    description: "現在のセッションのプロンプトバーの色を設定する。使用可能な色: red, blue, green, yellow, purple, orange, pink, cyan。`default` でリセット、引数なしでランダムな色を選択"
    argument-hint: "[color|default]"
  - name: compact
    description: 会話を圧縮する（フォーカス指示を任意で指定可能）
    argument-hint: "[instructions]"
  - name: config
    description: "設定インターフェースを開いてテーマ、モデル、出力スタイルなどを調整する。エイリアス: /settings"
  - name: context
    description: 現在のコンテキスト使用量をカラーグリッドで表示する。コンテキスト負荷の高いツール、メモリ膨張、容量警告の最適化提案も表示。`all` を渡すと項目ごとの詳細をフルスクリーンで展開
    argument-hint: "[all]"
  - name: copy
    description: "最後のアシスタントレスポンスをクリップボードにコピーする。数値Nを渡すとN番目に新しいレスポンスをコピー（例: /copy 2）。コードブロックがある場合は個別ブロックまたは全体を選択するピッカーを表示。ピッカーで `w` を押すとクリップボードの代わりにファイルに書き込む（SSH経由で便利）"
    argument-hint: "[N]"
  - name: desktop
    description: "現在のセッションをClaude Code Desktopアプリで続行する。macOSまたはWindowsとClaudeのサブスクリプションが必要。エイリアス: /app"
  - name: diff
    description: コミットされていない変更とターンごとのdiffを対話的に表示する。左右矢印キーでgit diffとClaudeの各ターンを切り替え、上下キーでファイルを閲覧
  - name: doctor
    description: Claude Codeのインストール状態と設定を診断・検証する。結果はステータスアイコン付きで表示。`f`キーでClaudeに問題を修正させる
  - name: effort
    description: "モデルの推論レベルを設定する。low/medium/high/xhigh/max/ultracodeを指定可能。利用可能なレベルはモデル依存。maxとultracodeは現在のセッションのみ。ultracodeはxhighの推論と自動ワークフローオーケストレーションを組み合わせる。autoでモデルのデフォルトにリセット。引数なしで対話的スライダーを開く"
    argument-hint: "[level|auto]"
  - name: exit
    description: "CLIを終了する。エイリアス: /quit"
  - name: export
    description: "現在の会話をプレーンテキストとしてエクスポートする。ファイル名を指定するとそのファイルに直接書き込み、指定なしの場合はクリップボードへのコピーまたはファイル保存のダイアログを開く"
    argument-hint: "[filename]"
  - name: fast
    description: Fastモードのオン/オフを切り替える
    argument-hint: "[on|off]"
  - name: feedback
    description: "フィードバックの送信、バグ報告、会話の共有を行う。エイリアス: /bug, /share"
    argument-hint: "[report]"
  - name: focus
    description: フォーカスビューをトグルする。直前のプロンプト、ツール呼び出しのサマリー（編集diffstat付き）、最終レスポンスのみを表示。選択状態はセッション間で保持される。fullscreenレンダリング時のみ利用可能
  - name: fork
    description: "現在の会話のこの時点でフォークを作成する。/branch のエイリアス"
    argument-hint: "[name]"
  - name: goal
    description: "ゴールを設定する。Claudeは条件が満たされるまで複数ターンにわたって作業を続ける。引数なしで現在のゴールを表示。インタラクティブ・-p・Remote Controlの各モードで動作"
    argument-hint: "[condition|clear]"
  - name: heapdump
    description: メモリ使用量診断用にJavaScriptヒープスナップショットとメモリブレークダウンを ~/Desktop に出力する
  - name: help
    description: 使い方のヘルプを表示する
  - name: hooks
    description: ツールイベント用のフック設定を表示する
  - name: ide
    description: IDE連携の管理とステータス表示
  - name: insights
    description: Claude Codeセッションの分析レポートを生成する（プロジェクト領域、操作パターン、摩擦ポイント）
  - name: init
    description: "CLAUDE.mdガイドでプロジェクトを初期化する。CLAUDE_CODE_NEW_INIT=1で、スキル・フック・個人メモリファイルの設定も含むインタラクティブフローを使用可能"
  - name: install-github-app
    description: リポジトリにClaude GitHub Actionsをセットアップする
  - name: install-slack-app
    description: Claude Slackアプリをインストールする
  - name: keybindings
    description: キーバインド設定ファイルを開くまたは作成する
  - name: login
    description: Anthropicアカウントにサインインする
  - name: logout
    description: Anthropicアカウントからサインアウトする
  - name: loop
    description: "プロンプトやスラッシュコマンドを定期的に実行する（例：/loop 5m /foo、デフォルト10分間隔）。エイリアス: /proactive"
    argument-hint: "[interval] [prompt]"
  - name: mcp
    description: MCPサーバー接続とOAuth認証を管理する
  - name: memory
    description: CLAUDE.mdメモリファイルの編集、自動メモリの有効化/無効化、自動メモリエントリの表示を行う
  - name: mobile
    description: "Claudeモバイルアプリのダウンロード用QRコードを表示する。エイリアス: /ios, /android"
  - name: model
    description: AIモデルを切り替え、新規セッションのデフォルトとして保存する。対応モデルでは左右矢印キーで推論レベルを調整可能。引数なしでピッカーを開き、行で `s` キーを押すと現在のセッションのみ切り替える。会話に既存の出力がある場合、ピッカーは確認を求める
    argument-hint: "[model]"
  - name: passes
    description: 友人にClaude Codeの無料1週間パスを共有する。対象アカウントのみ表示
  - name: permissions
    description: "ツールパーミッションのallow・ask・denyルールを管理する。エイリアス: /allowed-tools"
  - name: plan
    description: "プロンプトからプランモードに直接入る。説明を渡すとそのタスクですぐにプランモードを開始する（例: /plan 認証バグを修正）"
    argument-hint: "[description]"
  - name: plugin
    description: Claude Codeプラグインを管理する
  - name: powerup
    description: インタラクティブなレッスンとアニメーションデモでClaude Codeの機能を発見する
  - name: privacy-settings
    description: プライバシー設定を表示・更新する。ProおよびMaxプランのサブスクライバーのみ利用可能
  - name: radio
    description: Claude FMのlo-fiラジオをブラウザで開く。Bedrock・Vertex・Foundryでは利用不可
  - name: recap
    description: 現在のセッションの1行サマリーをオンデマンドで生成する
  - name: release-notes
    description: インタラクティブなバージョンピッカーで変更履歴を表示する。特定のバージョンを選んでリリースノートを見るか、全バージョンをまとめて表示できる
  - name: reload-plugins
    description: アクティブなプラグインをすべてリロードし、保留中の変更を再起動なしで適用する。リロードされたコンポーネント数とロードエラーを報告
  - name: reload-skills
    description: 再起動せずにスキルとコマンドのディレクトリを再スキャンし、ディスク上の変更を反映する
  - name: remote-control
    description: "このセッションをclaude.aiからのリモートコントロールに利用可能にする。エイリアス: /rc"
  - name: remote-env
    description: --remoteで開始されたWebセッション用のデフォルトリモート環境を設定する
  - name: rename
    description: 現在のセッションの名前を変更し、プロンプトバーに表示する。名前未指定時は会話履歴から自動生成
    argument-hint: "[name]"
  - name: resume
    description: "IDまたは名前で会話を再開するか、セッションピッカーを開く。エイリアス: /continue"
    argument-hint: "[session]"
  - name: review
    description: 現在のセッションでPull Requestをローカルレビューする。より深いクラウドベースのレビューは /code-review ultra を参照
    argument-hint: "[PR]"
  - name: rewind
    description: "会話やコードを以前のポイントに巻き戻す、または選択したメッセージから要約する。チェックポイント機能参照。エイリアス: /checkpoint, /undo"
  - name: sandbox
    description: サンドボックスモードを切り替える。対応プラットフォームのみ
  - name: schedule
    description: "routines（Cloudスケジュールタスク）の作成・更新・一覧・実行を行う。Claudeが対話的にセットアップをガイドする。エイリアス: /routines"
    argument-hint: "[description]"
  - name: scroll-speed
    description: マウスホイールのスクロール速度を対話的に調整する。ダイアログ表示中にスクロール可能なルーラーで変更をプレビューできる
  - name: security-review
    description: 現在のブランチの保留中の変更をセキュリティ脆弱性の観点から分析する。git diffをレビューしインジェクション、認証の問題、データ漏洩などのリスクを特定
  - name: setup-bedrock
    description: Amazon Bedrock認証・リージョン・モデルピンをインタラクティブウィザードで設定する。CLAUDE_CODE_USE_BEDROCK=1の場合のみ表示
  - name: setup-vertex
    description: Google Vertex AI認証・プロジェクト・リージョン・モデルピンをインタラクティブウィザードで設定する。CLAUDE_CODE_USE_VERTEX=1の場合のみ表示
  - name: skills
    description: 利用可能なスキルを一覧表示する。`t`キーでトークン数でソート
  - name: status
    description: "設定インターフェースを開く（Statusタブ）。バージョン、モデル、アカウント、接続状況を表示。Claudeのレスポンス中でも動作"
  - name: statusline
    description: "Claude Codeのステータスラインを設定する。表示内容を指定するか、引数なしでシェルプロンプトから自動設定"
  - name: stickers
    description: Claude Codeステッカーを注文する
  - name: stop
    description: 現在のバックグラウンドセッションを停止する。バックグラウンドセッションにアタッチ中のみ利用可能。トランスクリプトとworktreeは保持される
  - name: tasks
    description: "バックグラウンドタスクの一覧と管理。エイリアス: /bashes"
  - name: team-onboarding
    description: ローカルのClaude Code使用状況からチームメイト向けのオンボーディングガイドを生成する
  - name: teleport
    description: "Claude Code Webセッションをこのターミナルに引き込む。ピッカーを開いてブランチと会話を取得。claude.aiサブスクリプションが必要。エイリアス: /tp"
    argument-hint: "[session]"
  - name: terminal-setup
    description: ターミナルのキーバインドを設定する（Shift+Enterなどのショートカット）。VS Code・Cursor・Windsurf・Alacritty・Zedなど必要なターミナルでのみ表示
  - name: theme
    description: "カラーテーマを変更する。ターミナルのダーク/ライトモードに追従するauto、ライト/ダーク、色覚対応（ダルトナイズ）、ANSIテーマを含む"
  - name: tui
    description: "ターミナルUIレンダラーを設定し、会話を保ったまま再起動する。fullscreenでフリッカーフリーのalt-screenレンダラーを有効化。引数なしで現在のレンダラーを表示"
    argument-hint: "[default|fullscreen]"
  - name: ultraplan
    description: ultraplanセッションでプランを作成し、ブラウザでレビューしてから実行する
    argument-hint: "<prompt>"
  - name: ultrareview
    description: "クラウドサンドボックス上で深いマルチエージェント・コードレビューを実行する。推奨される呼び出しは /code-review ultra で、/ultrareview はエイリアスとして残る。Pro/Maxプランでは3回まで無料、以降はusage creditsが必要"
    argument-hint: "[PR]"
  - name: upgrade
    description: より高いプランティアに切り替えるためのアップグレードページを開く
  - name: usage
    description: "セッションコスト、プラン使用制限、アクティビティ統計を表示する。エイリアス: /cost, /stats"
  - name: usage-credits
    description: "レート制限に達した際に作業を継続するための使用量クレジットを設定する。/extra-usage からリネームされ、旧名称はエイリアスとして引き続き利用可能"
  - name: voice
    description: 音声入力を切り替える、または特定のモードで有効化する。Claude.aiアカウントが必要
    argument-hint: "[hold|tap|off]"
  - name: web-setup
    description: ローカルのgh CLI認証情報を使用してClaude Code WebにGitHubアカウントを接続する
  - name: workflows
    description: 多数のバックグラウンドエージェントを横断してオーケストレーションする動的ワークフローの進捗ビューを開く
skills:
  - name: batch
    description: "大規模な変更を調査・計画し、5〜30の独立したワークツリーエージェントで並列実行してそれぞれPRを作成する"
    argument-hint: "<instruction>"
  - name: claude-api
    description: "Claude APIとManaged Agentsのリファレンス資料をプロジェクトの言語（Python, TypeScript, Java, Go, Ruby, C#, PHP, cURL）に応じて読み込む。tool use、streaming、batches、structured outputs、よくある落とし穴をカバー。`anthropic` または `@anthropic-ai/sdk` をインポートすると自動的に有効化"
    argument-hint: "[migrate|managed-agents-onboard]"
  - name: code-review
    description: "現在の diff を指定した effort レベルで、正しさのバグと再利用・簡素化・効率化のクリーンアップの観点からレビューする。effort が低いほど高確度の少数の指摘に絞り、high〜max では網羅範囲を広げ、`ultra` はクラウド上で深いマルチエージェントレビューを実行する。`--fix` で修正を working tree に適用、`--comment` で GitHub PR にインラインコメントとして投稿する"
    argument-hint: "[low|medium|high|xhigh|max|ultra] [--fix] [--comment] [target]"
  - name: debug
    description: 現在のセッションのデバッグログを有効にし、セッションのデバッグログを読んで問題をトラブルシュートする。説明を付けて分析の焦点を絞ることも可能
    argument-hint: "[description]"
  - name: deep-research
    description: "Web 検索をファンアウトし、ソースを取得・相互検証してから、引用付きのリサーチレポートを統合する"
    argument-hint: "<question>"
  - name: fewer-permission-prompts
    description: トランスクリプトから頻出するread-onlyのBashとMCPツール呼び出しをスキャンし、プロジェクトの `.claude/settings.json` に優先度付きのallowlistを追加してパーミッションプロンプトを削減する
  - name: loop
    description: "セッションが開いている間、プロンプトを繰り返し実行する。間隔を省略するとセルフペーシング。プロンプトを省略すると自律メンテナンスチェック（または `.claude/loop.md` のプロンプト）を実行"
    argument-hint: "[interval] <prompt>"
  - name: run
    description: "プロジェクトのアプリを起動・操作して、変更が動作している様子を実際に確認する。既存のプロジェクト用スキルがあればそれを優先し、なければプロジェクトタイプごとの組み込みパターンにフォールバックする"
  - name: run-skill-generator
    description: "/run と /verify に対し、クリーンな環境からプロジェクトのアプリをビルド・起動・操作する方法を教え込む"
  - name: simplify
    description: "変更されたコードを再利用・簡素化・効率化・抽象化の観点からレビューし、修正を適用する。品質改善のみで、バグは探さない（バグ検出は /code-review を使用）"
    argument-hint: "[target]"
  - name: verify
    description: "プロジェクトのアプリをビルドして実行し、実際の挙動を観察することで、コード変更が意図通り動作するかを確認する"
agents:
  - name: Explore
    description: コードベースの検索と分析に最適化された高速な読み取り専用エージェント
  - name: Plan
    description: プランモード中にコンテキストを収集してからプランを提示するリサーチエージェント
  - name: general-purpose
    description: 探索とアクションの両方を必要とする複雑なマルチステップタスク向けの汎用エージェント
  - name: statusline-setup
    description: /statuslineでステータスラインを設定する際に使用
  - name: claude-code-guide
    description: Claude Codeの機能について質問する際に使用
