# Claude Code teams
sourcePath: "~/.claude/teams/**/config.json@. | select(.createdAt / 1000 > (now - 86400)) | select((.members | length) >= 2) | .members"
name: "{json@name}"
description: "{json@prompt}|{json:1@description}"
color: "{json@color}|#ffffff"
icon: organization
label: "{dirname}"
searchPrefix: team
orderBy: "{json@joinedAt} desc"
displayTime: "{json@joinedAt}"
