# Claude Code plans (from ~/.claude/plans/*.md, search with @plan:)
pluginDescription: "~/.claude/plans/*.md, search with @plan:"
name: "{basename}"
description: "{heading}"
path: ~/.claude/plans
icon: file-text
color: blue
pattern: "*.md"
searchPrefix: plan
inputFormat: "{filepath}"
orderBy: "{updatedAt} desc"
displayTime: "{updatedAt}"
