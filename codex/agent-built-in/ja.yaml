# OpenAI Codex CLI 組み込みスラッシュコマンド
#
# color プロパティは名前付きカラーと16進カラーコードの両方に対応:
# - 名前付きカラー: grey, darkGrey, slate, stone, red, rose, orange, amber, yellow, lime, green, emerald, teal, cyan, sky, blue, indigo, violet, purple, fuchsia, pink
# - 16進コード: #RGB or #RRGGBB (例: #00CC66, #0C6)

name: codex
color: sky  # 16進コードも使用可能 例: "#00CC66"
reference: https://developers.openai.com/codex/cli/slash-commands/

commands:
  - name: agent
    description: アクティブなエージェントスレッドを切り替えてサブエージェントの作業を確認する
  - name: apps
    description: アプリ（コネクタ）を閲覧してプロンプトに挿入する
  - name: approve
    description: 直前のコマンドに対する自動レビューの拒否を一度だけ再試行する
  - name: clear
    description: ターミナルをクリアして新しいチャットを開始する
  - name: compact
    description: 表示中の会話を要約してトークンを解放する
  - name: copy
    description: 最新の完了済みCodex出力をクリップボードにコピーする
  - name: debug-config
    description: 設定レイヤーと要件の診断情報を表示する
  - name: diff
    description: Git未追跡ファイルを含むGit diffを表示する
  - name: experimental
    description: 実験的機能を切り替える
  - name: fast
    description: 対応モデルのFastモードを切り替える
    argument-hint: "[on|off|status]"
  - name: feedback
    description: メンテナーにログと診断情報を送信する
  - name: fork
    description: 現在の会話を新しいスレッドにクローンする
  - name: goal
    description: タスクの目標を設定・一時停止・再開・確認・クリアする
    argument-hint: "[<objective>|pause|resume|clear]"
  - name: hooks
    description: ライフサイクルフックを確認し、現在のセッションに読み込まれたフック設定を表示・管理する
  - name: ide
    description: 開いているファイル・現在の選択範囲などのIDEコンテキストを取り込む
    argument-hint: "[text]"
  - name: init
    description: 現在のディレクトリにAGENTS.mdのひな形を生成する
  - name: keymap
    description: キーボードショートカットを確認・再マッピングする
  - name: logout
    description: 現在のユーザーのローカル認証情報をクリアする
  - name: mcp
    description: 利用可能なModel Context Protocolツールを一覧表示する
    argument-hint: "[verbose]"
  - name: memories
    description: メモリの注入や生成を含む、メモリの利用方法を設定する
  - name: mention
    description: 特定のファイルやフォルダを会話にアタッチする
    argument-hint: "<file_path>"
  - name: model
    description: 使用するモデルと推論レベルを選択する
  - name: new
    description: 同じCLIセッション内で新しい会話を開始する
  - name: permissions
    description: "Codexが確認なしで実行できる操作を設定する。エイリアス: /approvals"
  - name: personality
    description: コミュニケーションスタイルを選択する（friendly, pragmatic, none）
  - name: plan
    description: プランモードに切り替え、必要に応じてプロンプトを送信する
    argument-hint: "[prompt]"
  - name: plugins
    description: インストール済みおよび発見可能なプラグインとそのツールを表示する
  - name: ps
    description: バックグラウンドターミナルと最新の出力を表示する
  - name: quit
    description: "CLIを即座に終了する。エイリアス: /exit"
  - name: raw
    description: ターミナルでのテキスト選択を容易にするため、raw スクロールバック表示を切り替える
    argument-hint: "[on|off]"
  - name: resume
    description: 以前に保存した会話をリロードする
  - name: review
    description: ワーキングツリーの変更のCodex分析をリクエストする
  - name: sandbox-add-read-dir
    description: 現在のルート外のディレクトリへの読み取りアクセスを付与する（Windowsのみ）
    argument-hint: "<absolute_directory_path>"
  - name: side
    description: 一時的なサイド会話を開始する
    argument-hint: "[prompt]"
  - name: skills
    description: タスクに特化したスキルコンテキストを閲覧・適用する
  - name: status
    description: セッション設定とトークン使用量を表示する
  - name: statusline
    description: フッターのステータスライン項目を設定・並べ替える
  - name: stop
    description: "現在のセッションのバックグラウンドターミナルをすべてキャンセルする。エイリアス: /clean"
  - name: theme
    description: シンタックスハイライトテーマを選択する。ターミナルのシンタックスハイライトテーマをプレビューして永続化する
  - name: title
    description: ターミナルウィンドウのタイトル項目を設定する
  - name: vim
    description: コンポーザー編集用のVimモードを切り替える
