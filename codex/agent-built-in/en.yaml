# OpenAI Codex CLI built-in
#
# Color property supports both named colors and hex color codes:
# - Named colors: grey, darkGrey, slate, stone, red, rose, orange, amber, yellow, lime, green, emerald, teal, cyan, sky, blue, indigo, violet, purple, fuchsia, pink
# - Hex codes: #RGB or #RRGGBB (e.g., #00CC66, #0C6)

name: codex
description: Codex CLI built-in commands
color: sky  # You can also use hex codes like "#00CC66"
reference: https://developers.openai.com/codex/cli/slash-commands/

commands:
  - name: agent
    description: Switch between active agent threads to inspect subagent work
  - name: apps
    description: Browse apps (connectors) and insert them into your prompt
  - name: approve
    description: Retry a one-time auto-review denial for the previous command
  - name: clear
    description: Clear the terminal and start a fresh chat
  - name: compact
    description: Summarize the visible conversation to free tokens
  - name: copy
    description: Copy the latest completed Codex output
  - name: debug-config
    description: Print config layer and requirements diagnostics
  - name: diff
    description: Show the Git diff, including files Git isn't tracking yet
  - name: experimental
    description: Toggle experimental features
  - name: fast
    description: Toggle Fast mode for supported models
    argument-hint: "[on|off|status]"
  - name: feedback
    description: Submit logs and diagnostics to maintainers
  - name: fork
    description: Clone current conversation into new thread
  - name: goal
    description: Set, pause, resume, view, or clear a task goal
    argument-hint: "[<objective>|pause|resume|clear]"
  - name: hooks
    description: Review lifecycle hooks and view/manage hook configuration loaded into the current session
  - name: ide
    description: Include open files, current selection, and other IDE context
    argument-hint: "[text]"
  - name: init
    description: Generate an AGENTS.md scaffold in the current directory
  - name: keymap
    description: Inspect and remap keyboard shortcuts
  - name: logout
    description: Clear local credentials for current user
  - name: mcp
    description: List available Model Context Protocol tools
    argument-hint: "[verbose]"
  - name: memories
    description: Configure memory use, including memory injection and generation
  - name: mention
    description: Attach specific files or folders to conversation
    argument-hint: "<file_path>"
  - name: model
    description: Choose active model and reasoning effort level
  - name: new
    description: Start fresh conversation within same CLI session
  - name: permissions
    description: "Set what Codex can do without asking first. Alias: /approvals"
  - name: personality
    description: Select communication style (friendly, pragmatic, none)
  - name: plan
    description: Switch to plan mode and optionally send a prompt
    argument-hint: "[prompt]"
  - name: plugins
    description: Inspect installed and discoverable plugins with their tools
  - name: ps
    description: Display background terminals and recent output
  - name: quit
    description: "Exit the CLI immediately. Alias: /exit"
  - name: raw
    description: Toggle raw scrollback rendering for better terminal text selection
    argument-hint: "[on|off]"
  - name: resume
    description: Reload a previously saved conversation
  - name: review
    description: Request Codex analysis of working tree changes
  - name: sandbox-add-read-dir
    description: Grant read access to directories outside current roots (Windows only)
    argument-hint: "<absolute_directory_path>"
  - name: side
    description: "Start an ephemeral side conversation. Alias: /btw"
    argument-hint: "[prompt]"
  - name: skills
    description: Browse and apply task-specific skill context
  - name: status
    description: Display session configuration and token usage
  - name: statusline
    description: Configure and reorder footer status-line items
  - name: stop
    description: "Cancel all background terminals for the current session. Alias: /clean"
  - name: theme
    description: Choose a syntax-highlighting theme. Preview and persist your selection
  - name: title
    description: Configure terminal window title fields
  - name: vim
    description: Toggle Vim mode for composer editing
